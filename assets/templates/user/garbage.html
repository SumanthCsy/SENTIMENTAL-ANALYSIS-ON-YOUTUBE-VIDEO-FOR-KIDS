<div class="container">

    <div class="row" style="padding-top: 3%;">
        <div class="col-lg-3 ">
            <label for="">Select Ratings:</label>
        </div>
        <div class="col-lg-6">
            <div class="starrating risingstar d-flex justify-content-end flex-row-reverse ">

                <input type="radio" id="star5" name="rating" value="5" /><label
                    for="star5" title="5 star"></label>
                <input type="radio" id="star4" name="rating" value="4" /><label
                    for="star4" title="4 star"></label>
                <input type="radio" id="star3" name="rating" value="3" /><label
                    for="star3" title="3 star"></label>
                <input type="radio" id="star2" name="rating" value="2" /><label
                    for="star2" title="2 star"></label>
                <input type="radio" id="star1" name="rating" value="1" /><label
                    for="star1" title="1 star"  ></label>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-lg-3">
            <label for="">Add Feedback:</label>
        </div>
        <div class="col-sm-6">
            <textarea type="text" name="review" id="" cols="50" rows="5" value="" required></textarea>
        </div>
    </div>
    <div class="row justify-content-center mt-5">
        <div class="col-4 ">
            <button   class="btn mb-3">Submit</button>
        </div>
    </div>
</div>
